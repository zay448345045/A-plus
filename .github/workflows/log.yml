name: "🚀 Actions 物理日志全量存档"

on:
#  schedule:
    # 每周一凌晨 0:00 自动运行一次 (UTC 时间)
#    - cron: '0 0 * * 1'
  workflow_dispatch:
    # 支持手动触发，方便你现在立刻运行
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动抢救近期日志'

jobs:
  backup-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须开启写入权限以创建 Release
    
    steps:
      - name: "🛒 检出仓库"
        uses: actions/checkout@v6
        with:
          ref: checkout
          fetch-depth: 1
      - name: "🛠️ 执行备份脚本"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p all-repo-logs
          echo "正在全量检索仓库内所有已完成的任务记录..."
          
          # 获取最近 1000 条记录的元数据
          run_data=$(gh run list --limit 1000 --json databaseId,status,workflowName,conclusion --jq '.[] | select(.status=="completed")')
          
          if [ -z "$run_data" ]; then
            echo "未找到任何已完成的记录。"
            exit 0
          fi

          # 循环处理每个 ID
          echo "$run_data" | jq -c '.' | while read -r item; do
            id=$(echo "$item" | jq -r '.databaseId')
            # 跳过当前的备份任务
            if [ "$id" == "$GITHUB_RUN_ID" ]; then continue; fi
            
            wf_name=$(echo "$item" | jq -r '.workflowName | gsub(" "; "_")')
            conclusion=$(echo "$item" | jq -r '.conclusion')
            
            target_dir="all-repo-logs/${wf_name}_${conclusion}/run-$id"
            mkdir -p "$target_dir"
            
            echo "▶️ 正在处理: [$conclusion] $wf_name (ID: $id)"
            
            # 使用 --log 抓取文本日志，避开已过期的 Artifacts 限制
            if gh run view "$id" --log > "$target_dir/console_execution.log" 2>/dev/null; then
              if [ ! -s "$target_dir/console_execution.log" ]; then
                rm -rf "$target_dir"
              fi
            else
              rm -rf "$target_dir"
            fi
          done

          # 清理并打包
          find all-repo-logs -type d -empty -delete
          
          if [ -z "$(ls -A all-repo-logs)" ]; then
            echo "没有可抓取的有效文本日志。"
            exit 0
          fi

          zip_name="logs-archive-$(date +'%Y%m%d-%H%M').zip"
          zip -r -q "$zip_name" all-repo-logs/
          
          # 传递变量给后续步骤
          echo "ZIP_FILE=$zip_name" >> $GITHUB_ENV
          echo "TAG_NAME=logs-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: "📦 发布至 Release (永久存档)"
        if: env.ZIP_FILE != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "日志自动存档: $(date +'%Y-%m-%d %H:%M')"
          body: |
            ## 自动生成的日志备份
            - 包含仓库内最近 1000 条任务的控制台文本输出。
            - 状态分类：已按成功/失败状态对文件夹进行重命名。
            - 触发原因：${{ github.event.inputs.reason || '定时自动备份' }}
          files: ${{ env.ZIP_FILE }}
          draft: false
          prerelease: false
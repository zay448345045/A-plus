name: Export ALL Status Action Logs (Full Scan)

on:
  workflow_dispatch: # 手动触发

jobs:
  export-all-status:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: checkout
          fetch-depth: 1
      - name: Fetch and Package All Logs (Success & Failure)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p all-repo-logs
          echo "正在全量检索仓库内所有 Action 运行记录..."

          # 1. 核心改进：不限制 status，直接获取所有已完成的任务
          # 这样会包含 success, failure, cancelled, skipped, timed_out 等所有状态
          # --limit 1000 是 GitHub CLI 的单次抓取上限
          run_ids=$(gh run list --limit 1000 --json databaseId,status,workflowName --jq '.[] | select(.status=="completed") | .databaseId')

          if [ -z "$run_ids" ]; then
            echo "未找到任何已完成的运行记录。"
            exit 0
          fi

          echo "开始分类下载日志..."

          for id in $run_ids; do
            # 跳过当前的这个备份任务
            if [ "$id" == "$GITHUB_RUN_ID" ]; then continue; fi
            
            # 获取元数据：工作流名称和运行状态
            metadata=$(gh run view $id --json workflowName,conclusion --jq '"\(.workflowName | gsub(" "; "_"))_\(.conclusion)"')
            
            echo "正在处理 Run ID: $id (状态: $metadata)"
            
            # 创建带状态标识的文件夹：例如 "Build_Android_failure/run-12345"
            target_dir="all-repo-logs/${metadata}/run-$id"
            mkdir -p "$target_dir"
            
            # 执行下载。若日志已物理过期，gh 会报错，我们捕获并清理空目录
            if ! gh run download $id --dir "$target_dir"; then
              echo "Run ID $id 日志已过期，无法抓取。"
              rm -rf "$target_dir"
            fi
          done

          # 2. 清理因过期产生的残留空目录
          find all-repo-logs -type d -empty -delete

          # 3. 统计并打包
          if [ -z "$(ls -A all-repo-logs)" ]; then
            echo "没有可抓取的有效物理日志（可能全部已超过90天保留期）。"
            exit 1
          fi

          zip_name="full-status-logs-$(date +'%Y%m%d').zip"
          zip -r "$zip_name" all-repo-logs/
          
          echo "ZIP_FILE=$zip_name" >> $GITHUB_ENV
          echo "TAG_NAME=all-status-logs-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Create Release with Softprops
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "全状态Action日志汇总 - ${{ env.TAG_NAME }}"
          body: |
            ### 🛠 导出报告
            - **包含状态**: 成功(Success)、失败(Failure)、已取消(Cancelled)等。
            - **覆盖范围**: 仓库内所有 `.yml` 配置文件。
            - **数量上限**: 最近 1000 条记录。
            - **注意**: 若文件夹内无内容，说明该记录已超过 GitHub 的 90 天物理保留期。
          files: ${{ env.ZIP_FILE }}
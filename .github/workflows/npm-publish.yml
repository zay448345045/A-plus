name: docker npm published

on:
  workflow_dispatch: 
    inputs:
      workers:
        description: '备用：并发线程数（单文件无需调整）'
        required: false
        default: '1'

jobs:
  download_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 发布Release必需

    steps:
      - name: 清理服务器空间
        run: |
          echo "=== 初始磁盘空间 ==="
          df -h
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          sudo apt clean && sudo apt autoremove -y
          echo "=== 清理后磁盘空间 ==="
          df -h

      - name: 下载文件并处理文件名（移除特殊字符）
#        env:
#          SP_COOKIE: ${{ secrets.git }}
        run: |
          set -euo pipefail
          mkdir -p ./downloads && cd ./downloads

          # 下载链接
          URL="https://github.com/mozilla/pdf.js-sample-files/raw/master/tracemonkey.pdf"

          # 修复后的curl命令
          curl -L -A "Mozilla/5.0 (Windows NT 11.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
               -OJ -f -sS --show-error "$URL"

          # 关键1：获取实际文件名，并清理特殊字符（%/空格/括号等）-H "Cookie: $SP_COOKIE" \
          ACTUAL_FILENAME_RAW=$(ls -1)
          # 清理规则：%→_、空格→_、括号→空、其他特殊字符保留
          ACTUAL_FILENAME_CLEAN=$(echo "$ACTUAL_FILENAME_RAW" | sed -e 's/%/_/g' -e 's/ /_/g' -e 's/(/./g' -e 's/)/./g')
          # 重命名下载的文件（避免特殊字符问题）
          mv "$ACTUAL_FILENAME_RAW" "$ACTUAL_FILENAME_CLEAN"

          # 关键2：用清理后的文件名作为分卷名
          VOLUME_NAME="${ACTUAL_FILENAME_CLEAN%.*}"
          
          # 写入临时文件
          echo "$ACTUAL_FILENAME_CLEAN" > ../actual_filename.txt
          echo "$VOLUME_NAME" > ../volume_name.txt

          echo "✅ 下载完成，原始文件名：$ACTUAL_FILENAME_RAW"
          echo "✅ 清理后文件名：$ACTUAL_FILENAME_CLEAN"
          echo "✅ 分卷基础名：$VOLUME_NAME"
          ls -lh

      - name: 分卷压缩（修复匹配逻辑）
        if: success()
        run: |
          set -euo pipefail
          cd ./downloads

          # 读取清理后的文件名
          ACTUAL_FILENAME=$(cat ../actual_filename.txt)
          VOLUME_NAME=$(cat ../volume_name.txt)

          # 检查文件存在性（用引号包裹，兼容特殊字符）
          if [ ! -f "$ACTUAL_FILENAME" ]; then
            echo "❌ 源文件 '$ACTUAL_FILENAME' 不存在"
            exit 1
          fi

          # 分卷压缩（用清理后的文件名，无特殊字符）
          7z a -v1900m -mx0 "$VOLUME_NAME.7z" "$ACTUAL_FILENAME"

          # 修复：正确验证分卷（禁用通配符，用find命令匹配）
          VOLUME_COUNT=$(find . -maxdepth 1 -name "$VOLUME_NAME.7z.*" -type f | wc -l)
          if [ "$VOLUME_COUNT" -eq 0 ]; then
            echo "❌ 分卷压缩失败：未找到分卷文件"
            exit 1
          fi

          echo "✅ 分卷完成：共生成 $VOLUME_COUNT 个分卷"
          ls -lh "$VOLUME_NAME.7z."*

      - name: 发布Release并上传分卷
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "maimai-file-v${{ github.run_number }}"
          name: "Maimai 文件发布 v${{ github.run_number }}"
          body: |
            ## 下载完成（自动分卷）
            - 清理后文件名：$(cat actual_filename.txt)
            - 分卷文件：$(cat volume_name.txt).7z.*（共 $(find ./downloads -name "$(cat volume_name.txt).7z.*" | wc -l) 卷，每卷1900MB）
            - 解压方式：下载所有分卷后，用7-Zip打开第一个.7z.001文件自动合并解压
          # 用find命令匹配分卷，避免通配符问题
          files: |
            ./downloads/$(cat volume_name.txt).7z.*
#            ./downloads/$(cat volume_name.txt).7z.*

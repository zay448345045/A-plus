name: docker npm published

on:
  workflow_dispatch: 
    inputs:
      workers:
        description: '备用：并发线程数（单文件无需调整）'
        required: false
        default: '1'

jobs:
  download_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 发布Release必需

    steps:
      - name: 清理服务器空间
        run: |
          echo "=== 初始磁盘空间 ==="
          df -h
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          sudo apt clean && sudo apt autoremove -y
          echo "=== 清理后磁盘空间 ==="
          df -h

      - name: 下载文件并获取实际文件名（极简方案）
#        env:
#          SP_COOKIE: ${{ secrets.git }}
        run: |
          set -euo pipefail
          mkdir -p ./downloads && cd ./downloads

          # 下载链接
          URL="https://f6.erista.me/files/Eggman%27s%20Arcade%20Repository/Sega/Sega%20RingEdge/maimai%20PiNK%20PLUS%20%28SDCQ%29/maimai%20PiNK%20PLUS%20%28SDCQ%29%201.70.00%20EXTEND%20%282016%29%28JPN%2CEXP%29%28unpacked%29.zip"

          # 下载文件（-OJ 自动用服务器返回的文件名）
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               
               -OJ -f -sS --show-error "$URL"


          # 关键：下载后直接读取实际文件名（无URL解码、无特殊字符处理）-H "Cookie: $SP_COOKIE" \
          # 因为只下载1个文件，ls -1 直接获取唯一文件名
          ACTUAL_FILENAME=$(ls -1)
          # 去掉后缀作为分卷名（用shell变量写入文件，规避env上下文问题）
          VOLUME_NAME="${ACTUAL_FILENAME%.*}"
          
          # 把文件名写入临时文件（替代$GITHUB_ENV，彻底规避上下文解析错误）
          echo "$ACTUAL_FILENAME" > ../actual_filename.txt
          echo "$VOLUME_NAME" > ../volume_name.txt

          echo "✅ 下载完成，实际文件名：$ACTUAL_FILENAME"
          echo "✅ 分卷基础名：$VOLUME_NAME"
          ls -lh

      - name: 分卷压缩（直接读取临时文件中的文件名）
        if: success()
        run: |
          set -euo pipefail
          cd ./downloads

          # 从临时文件读取文件名（核心修复：避开env上下文）
          ACTUAL_FILENAME=$(cat ../actual_filename.txt)
          VOLUME_NAME=$(cat ../volume_name.txt)

          # 检查文件存在性
          if [ ! -f "$ACTUAL_FILENAME" ]; then
            echo "❌ 源文件 $ACTUAL_FILENAME 不存在"
            exit 1
          fi

          # 分卷压缩（直接用shell变量，无上下文问题）
          7z a -v1900m -mx0 "$VOLUME_NAME.7z" "$ACTUAL_FILENAME"

          # 验证分卷
          if [ $(ls -1 "$VOLUME_NAME.7z.*" 2>/dev/null | wc -l) -eq 0 ]; then
            echo "❌ 分卷压缩失败"
            exit 1
          fi
          echo "✅ 分卷完成：$VOLUME_NAME.7z.*"

      - name: 发布Release（读取临时文件中的分卷名）
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          # 用固定前缀+运行号做标签（避开特殊字符）
          tag_name: "maimai-file-v${{ github.run_number }}"
          name: "Maimai 文件发布 v${{ github.run_number }}"
          body: |
            ## 下载完成（自动分卷）
            - 原始文件名：$(cat actual_filename.txt)
            - 分卷文件：$(cat volume_name.txt).7z.*（每卷1900MB）
            - 解压方式：下载所有分卷docker后，用7-Zip打开第一个.7z.001文件自动合并
          # 上传分卷（读取临时文件中的分卷名）
          files: ./downloads/$(cat volume_name.txt).7z.*

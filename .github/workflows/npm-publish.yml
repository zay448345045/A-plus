# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package


on:
  workflow_dispatch: 

jobs:
  download_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download File
   #     env:
 #         SP_COOKIE: ${{ secrets.git }}
        run: |
          echo "on"
          URL="https://f6.erista.me/files/Eggman%27s%20Arcade%20Repository/Sega/Sega%20RingEdge/maimai%20PiNK%20PLUS%20%28SDCQ%29/maimai%20PiNK%20PLUS%20%28SDCQ%29%201.70.00%20EXTEND%20%282016%29%28JPN%2CEXP%29%28unpacked%29.zip"

          # -OJ 会根据服务器返回的 Content-Disposition 自动命名
          curl -L -A "Mozilla/5.0" \
               -H "Cookie: $SP_COOKIE" \
               -OJ "$URL"

          echo "check"
          ls -lh

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "package-v${{ github.run_number }}"
          name: "package v${{ github.run_number }}"
          body: |
            ## complete
            - renamed
          files: ./*

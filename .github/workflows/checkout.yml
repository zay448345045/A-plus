name: checkout

on:
  workflow_dispatch:
    inputs:
      current_index:
        description: '起始索引 (从第几个链接开始)'
        required: true
        default: '0'
      batch_size:
        description: '每轮处理的文件数量'
        required: true
        default: '5'
      volume_size:
        description: '分卷大小 (如 1900m)'
        required: false
        default: '1900m'

jobs:
  relay_harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 1. 检出资源清单
        uses: actions/checkout@v6
        with:
          ref: checkout     # 确保你的 urls.txt 在这个分支
          fetch-depth: 1

      - name: 2. 极致空间清理
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo docker image prune --all --force
          df -h /

      - name: 3. 执行智能分段收割
        id: worker
        run: |
          # --- 核心：移植成功脚本的鲁棒性设置 ---
          set +e  # 允许部分步骤非致命报错继续执行
          
          mkdir -p ./stage_zone
          
          # 处理链接清单 (支持逗号或换行)
          if [ -f "urls.txt" ]; then
            sed -i 's/,/\n/g' urls.txt
            sed -i 's/\r//g' urls.txt
            sed -i '/^$/d' urls.txt
          else
            echo "❌ 错误：未发现 urls.txt"
            exit 1
          fi

          START=${{ github.event.inputs.current_index }}
          SIZE=${{ github.event.inputs.batch_size }}
          TOTAL=$(cat urls.txt | wc -l)
          
          # 提取本轮目标链接
          sed -n "$((START+1)),$((START+SIZE))p" urls.txt > current_batch.txt
          
          processed_this_run=0
          
          while read -r URL; do
            [ -z "$URL" ] && continue
            
            # 文件名清洗与唯一化 (参考成功脚本逻辑)
            FILE_NAME_RAW=$(basename "$URL" | python3 -c "import urllib.parse, sys; print(urllib.parse.unquote(sys.stdin.read()).split('?')[0])")
            FILE_NAME_CLEAN=$(echo "$FILE_NAME_RAW" | sed -E 's/[^a-zA-Z0-9._-]/_/g' | sed -E 's/_+/_/g;s/^_//;s/_$//')
            
            # 增加时间戳和文件序号，彻底避免 Release 资产冲突
            FINAL_BASE="${FILE_NAME_CLEAN}_$(date +%m%d%H%M)_idx${processed_this_run}"
            
            echo "🚀 正在流式处理: $FILE_NAME_RAW"

            # 执行流式下载 + 7z 分卷 (移植成功脚本的参数)
            curl -L -A "Mozilla/5.0" --retry 5 --retry-delay 10 --fail "$URL" | \
            7z a -v"${{ github.event.inputs.volume_size }}" -mx0 -si "./stage_zone/${FINAL_BASE}.7z"
            
            SEVEN_ZIP_EXIT_CODE=$?
            
            # 验证分卷是否成功 (检查 .7z.001 是否存在)
            if ls ./stage_zone/${FINAL_BASE}.7z.* 1>/dev/null 2>&1; then
              echo "✅ $FINAL_BASE 分卷成功"
              processed_this_run=$((processed_this_run + 1))
            else
              echo "⚠️ $FINAL_BASE 处理异常，退出码: $SEVEN_ZIP_EXIT_CODE"
            fi
            
            # 空间熔断保护
            FREE_MB=$(df -m / | awk 'NR==2 {print $4}')
            if [ "$FREE_MB" -lt 3072 ]; then 
              echo "⚠️ 空间不足，强制断点接力"
              break
            fi
          done < current_batch.txt

          # 计算下一次索引并输出变量
          ACTUAL_NEXT=$((START + processed_this_run))
          echo "next_idx=$ACTUAL_NEXT" >> $GITHUB_OUTPUT
          [ $ACTUAL_NEXT -lt $TOTAL ] && echo "should_relay=true" >> $GITHUB_OUTPUT || echo "should_relay=false" >> $GITHUB_OUTPUT
          
          # 恢复严格模式
          set -e

      - name: 4. 资产归档至 Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          tag_name: "relay-vault-v4"
          name: "无限接力资源库 V4"
          # 关键：必须包含最后的通配符 .* 以匹配分卷后缀 .001, .002
          files: ./stage_zone/*.7z.*
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. 自动化接力触发
        if: always() && steps.worker.outputs.should_relay == 'true'
        run: |
          echo "🏁 本轮结束，准备触发索引: ${{ steps.worker.outputs.next_idx }}"
          gh workflow run "${{ github.workflow }}" \
            -f current_index=${{ steps.worker.outputs.next_idx }} \
            -f batch_size=${{ github.event.inputs.batch_size }} \
            -f volume_size=${{ github.event.inputs.volume_size }}
        env:
          GH_TOKEN: ${{ github.token }}